name: 'star_schema_warehouse'
version: '1.0.0'
config-version: 2

profile: 'star_schema_warehouse'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  start_date: '2020-01-01'
  elementary:
    schema: 'elementary'

models:
  star_schema_warehouse:
    staging:
      +materialized: view
      +schema: stg
      +tags: ['staging', 'bronze']

    raw_vault:
      +materialized: incremental
      +incremental_strategy: merge
      +schema: raw_vault
      +tags: ['raw_vault', 'silver']
      hubs:
        +unique_key: hash_key
      links:
        +unique_key: hash_key
      satellites:
        +unique_key: ['hash_key', 'load_date']

    business_vault:
      +materialized: table
      +schema: bus_vault
      +tags: ['business_vault', 'silver']

    dimensions:
      +materialized: table
      +schema: dim
      +tags: ['dimensions', 'gold']

    facts:
      +materialized: incremental
      +incremental_strategy: merge
      +schema: fct
      +tags: ['facts', 'gold']

    marts:
      +materialized: table
      +schema: mart
      +tags: ['marts', 'gold']

seeds:
  star_schema_warehouse:
    +schema: ref_data
    +tags: ['seeds', 'reference']

snapshots:
  star_schema_warehouse:
    +target_schema: snapshots
    +tags: ['snapshots']
