name: CI — dbt Build & Test

on:
  pull_request:
    branches:
      - main
    paths:
      - 'models/**'
      - 'tests/**'
      - 'snapshots/**'
      - 'macros/**'
      - 'seeds/**'
      - 'dbt_project.yml'
      - 'packages.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DBT_PROFILES_DIR: .
  SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
  SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
  SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE_CI }}
  SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}

jobs:
  lint:
    name: SQLFluff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install linting dependencies
        run: |
          pip install --upgrade pip
          pip install sqlfluff>=3.1.0 sqlfluff-templater-dbt>=3.1.0 dbt-snowflake>=1.8.0

      - name: Install dbt packages
        run: dbt deps

      - name: Run SQLFluff lint
        run: sqlfluff lint models/ --dialect snowflake --format github-annotation

  dbt-build:
    name: dbt Build (modified+)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dbt and Elementary
        run: |
          pip install --upgrade pip
          pip install dbt-snowflake>=1.8.0 elementary-data>=0.15.0 dbt-checkpoint

      - name: Copy profiles
        run: cp profiles.yml.example profiles.yml

      - name: Install dbt packages
        run: dbt deps

      - name: dbt seed
        run: dbt seed --target ci

      - name: dbt build (modified models + downstream)
        run: |
          dbt build \
            --select state:modified+ \
            --defer \
            --state ./target \
            --target ci \
            --fail-fast
        env:
          DBT_STATE: ./target

      - name: Upload dbt artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts-ci
          path: target/
          retention-days: 7

  elementary:
    name: Elementary Data Observability
    runs-on: ubuntu-latest
    needs: dbt-build
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Elementary
        run: |
          pip install --upgrade pip
          pip install elementary-data>=0.15.0 dbt-snowflake>=1.8.0

      - name: Copy profiles
        run: cp profiles.yml.example profiles.yml

      - name: Run Elementary monitors
        run: edr run --target ci

      - name: Generate Elementary report
        run: edr report --target ci
        if: always()

      - name: Upload Elementary report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: elementary-report
          path: edr_target/
          retention-days: 7
